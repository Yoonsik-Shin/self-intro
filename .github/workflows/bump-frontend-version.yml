name: Bump Frontend Version

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'frontend/package.json'
      - 'frontend/package-lock.json'

permissions:
  contents: write

concurrency:
  group: bump-frontend-version-${{ github.ref }}
  cancel-in-progress: false

jobs:
  bump-minor-version:
    if: ${{ github.actor != 'github-actions[bot]' && !contains(github.event.head_commit.message, '[skip version]') }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Bump frontend minor version
        id: version
        run: |
          cd frontend
          npm version minor --no-git-tag-version
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Commit and push version bump
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add frontend/package.json frontend/package-lock.json
          git commit -m "chore(release): bump frontend to v${{ steps.version.outputs.version }} [skip version]"
          git pull --rebase origin main
          git push origin main
