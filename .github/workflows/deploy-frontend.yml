name: Frontend CI/CD Pipeline

on:
  push:
    branches:
      - main
    paths:
      - 'frontend-next/**'
      - '.github/workflows/deploy-frontend.yml'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build-and-push:
    # npm ci/next build이 QEMU 에뮬레이션 위에서 illegal instruction으로 죽는 문제가 있어
    # amd64 러너 + QEMU 크로스빌드 대신 네이티브 arm64 러너를 사용한다.
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to OCI Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.OCI_REGISTRY || 'yny.ocir.io' }}
          username: ${{ secrets.OCI_USERNAME }}
          password: ${{ secrets.OCI_AUTH_TOKEN }}

      - name: Set short git commit SHA
        id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Build and Push Docker Image (ARM64)
        uses: docker/build-push-action@v5
        with:
          context: ./frontend-next
          file: ./frontend-next/Dockerfile
          platforms: linux/arm64
          push: true
          build-args: |
            NEXT_PUBLIC_API_BASE_URL=https://api.unbrdn.me
          tags: |
            yny.ocir.io/axrywc89b6lf/self-intro/frontend:${{ steps.vars.outputs.sha_short }}
            yny.ocir.io/axrywc89b6lf/self-intro/frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          for i in 1 2 3 4 5; do
            git fetch origin main
            git reset --hard origin/main
            sed -i 's/newTag: .*/newTag: "${{ steps.vars.outputs.sha_short }}"/g' deploy/k8s/overlays/prod/frontend/kustomization.yaml
            git add deploy/k8s/overlays/prod/frontend/kustomization.yaml
            git commit -m "[bot] Update frontend image tag to ${{ steps.vars.outputs.sha_short }}" || exit 0
            if git push origin main; then
              exit 0
            fi
            echo "Push rejected (attempt $i), retrying after refetch..."
            sleep $((RANDOM % 10 + 5))
          done
          echo "::error::Failed to push kustomization update after retries"
          exit 1
