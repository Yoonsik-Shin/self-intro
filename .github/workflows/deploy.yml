name: CI/CD Pipeline

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - '.github/workflows/deploy.yml'

permissions:
  contents: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to OCI Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.OCI_REGISTRY || 'yny.ocir.io' }}
          username: ${{ secrets.OCI_USERNAME }}
          password: ${{ secrets.OCI_AUTH_TOKEN }}

      - name: Set short git commit SHA
        id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Build and Push Docker Image (ARM64)
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          platforms: linux/arm64
          push: true
          tags: |
            yny.ocir.io/axrywc89b6lf/self-intro/backend:${{ steps.vars.outputs.sha_short }}
            yny.ocir.io/axrywc89b6lf/self-intro/backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Update Kustomize image tag
        run: |
          cd deploy/k8s/overlays/prod/backend
          sed -i 's/newTag: .*/newTag: "${{ steps.vars.outputs.sha_short }}"/g' kustomization.yaml

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add deploy/k8s/overlays/prod/backend/kustomization.yaml
          git commit -m "[bot] Update backend image tag to ${{ steps.vars.outputs.sha_short }}" || exit 0
          git push origin main
