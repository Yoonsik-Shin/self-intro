apiVersion: apps/v1
kind: Deployment
metadata:
  name: self-intro-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: self-intro-backend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: self-intro-backend
    spec:
      imagePullSecrets:
        - name: ocir-pull-secret
      containers:
        - name: backend
          image: self-intro-backend
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          envFrom:
            - configMapRef:
                name: backend-config
            - secretRef:
                name: backend-db-secret
            - secretRef:
                name: backend-ai-secret
            - secretRef:
                name: backend-storage-secret
            # 페이앱 연동키 발급 전에도 배포가 깨지지 않도록 optional로 둔다
            - secretRef:
                name: backend-payapp-secret
                optional: true
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: http
            initialDelaySeconds: 45
            periodSeconds: 20
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
