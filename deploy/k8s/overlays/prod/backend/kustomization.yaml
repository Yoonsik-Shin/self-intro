apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: self-intro

resources:
  - ../../../base/backend
  - ingress.yaml
  - sealed-db-secret.yaml

images:
  - name: self-intro-backend
    newName: yny.ocir.io/axrywc89b6lf/self-intro/backend
    newTag: "617037b"

configMapGenerator:
  - name: backend-config
    literals:
      - CORS_ALLOWED_ORIGINS=https://unbrdn.me,https://www.unbrdn.me
      - JPA_DDL_AUTO=none
      - COOKIE_DOMAIN=unbrdn.me
      - VISITOR_COOKIE_SECURE=true
