apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: self-intro

resources:
  - ../../../base/backend
  - ingress.yaml
  - sealed-db-secret.yaml
  - sealed-ai-secret.yaml
  - sealed-storage-secret.yaml
  - sealed-kofi-secret.yaml

images:
  - name: self-intro-backend
    newName: yny.ocir.io/axrywc89b6lf/self-intro/backend
    newTag: "ca4d01d"

configMapGenerator:
  - name: backend-config
    literals:
      # TODO: frontend-next를 staging.unbrdn.me에서 검증하는 동안만 임시로 추가함.
      # 컷오버 끝나고 staging 검증이 더 이상 필요 없어지면 이 origin은 제거할 것.
      - CORS_ALLOWED_ORIGINS=https://unbrdn.me,https://www.unbrdn.me,https://staging.unbrdn.me
      - JPA_DDL_AUTO=none
      - COOKIE_DOMAIN=unbrdn.me
      - VISITOR_COOKIE_SECURE=true
      - COMPETENCY_AI_ENABLED=true
      - STUDY_AI_ENABLED=true
      - EXPERIENCE_AI_ENABLED=true
      - NVIDIA_API_BASE_URL=https://integrate.api.nvidia.com
      - NVIDIA_MODEL=qwen/qwen3.5-122b-a10b
      - NVIDIA_MAX_OUTPUT_TOKENS=8192
      - KOFI_PAGE_URL=https://ko-fi.com/yoonsik
      - STORAGE_ENDPOINT=https://axrywc89b6lf.compat.objectstorage.ap-chuncheon-1.oraclecloud.com
      - STORAGE_REGION=ap-chuncheon-1
      - STORAGE_BUCKET=self-intro-images
      - STORAGE_PATH_STYLE_ACCESS=true
      - STORAGE_PRESIGNED_TTL_SECONDS=300
      # OCI 엔드포인트를 직접 가리킴 (Cloudflare Free 플랜은 Origin Rules의 Host Header
      # rewrite가 유료 기능이라 cdn.unbrdn.me 프록시를 붙이지 못함 — 트래픽이 늘어나면
      # Cloudflare Worker로 프록시하거나 플랜을 업그레이드하는 방안을 재검토할 것).
      # objectKey만 DB에 저장되므로 이 값을 나중에 바꿔도 기존 갤러리 이미지는 그대로
      # 새 URL로 나간다 (마크다운 본문에 삽입된 이미지는 절대경로가 텍스트에 그대로
      # 박혀 있어 별도 SQL 치환이 필요함).
      - STORAGE_PUBLIC_BASE_URL=https://axrywc89b6lf.compat.objectstorage.ap-chuncheon-1.oraclecloud.com/self-intro-images
