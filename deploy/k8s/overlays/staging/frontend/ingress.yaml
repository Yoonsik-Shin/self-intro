apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  # overlays/prod/frontend/ingress.yaml("self-intro-frontend")와 이름을 다르게 둔다 — 같은
  # 이름이면 나중에 실제 컷오버 시 prod ingress를 적용할 때 이 리소스를 덮어써 버린다.
  name: self-intro-frontend-staging
  namespace: self-intro
spec:
  ingressClassName: nginx
  tls:
    # unbrdn.me용 Origin CA 인증서의 SAN에 staging.unbrdn.me가 포함되어 있어야 한다.
    # 포함 안 돼 있으면 이 서브도메인만 별도 인증서를 새로 발급하거나, 지금 기회에
    # *.unbrdn.me 와일드카드로 재발급해서 앞으로의 서브도메인 추가에도 대비하는 걸 권장.
    - hosts:
        - staging.unbrdn.me
      secretName: cloudflare-origin-tls
  rules:
    - host: staging.unbrdn.me
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                # base/frontend가 정의하는 서비스를 그대로 가리킨다 — 나중에 실제 unbrdn.me로
                # 컷오버할 때도 같은 Deployment/Service를 그대로 재사용하고 Ingress만 바뀐다.
                name: self-intro-frontend
                port:
                  number: 3000
