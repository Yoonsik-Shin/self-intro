apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: self-intro-frontend
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/Yoonsik-Shin/self-intro.git'
    targetRevision: HEAD
    path: deploy/k8s/overlays/prod/frontend
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: self-intro
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
