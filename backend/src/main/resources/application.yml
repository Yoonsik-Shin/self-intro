spring:
  application:
    name: self-intro-backend
  ai:
    model:
      chat: openai
    retry:
      max-attempts: 1
    openai:
      base-url: ${NVIDIA_API_BASE_URL:https://integrate.api.nvidia.com}
      api-key: ${NVIDIA_API_KEY:not-configured}
      chat:
        options:
          model: ${NVIDIA_MODEL:qwen/qwen3.5-122b-a10b}
          temperature: 0.2
          top-p: 0.9
          max-tokens: ${NVIDIA_MAX_OUTPUT_TOKENS:4096}
      embedding:
        enabled: false
  datasource:
    url: ${DB_URL:jdbc:h2:mem:selfintro;MODE=MySQL;DATABASE_TO_LOWER=TRUE}
    username: ${DB_USERNAME:sa}
    password: ${DB_PASSWORD:}
    driver-class-name: ${DB_DRIVER:org.h2.Driver}
  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:none}
    open-in-view: false
  flyway:
    baseline-on-migrate: true
    properties:
      hibernate:
        format_sql: true
  h2:
    console:
      enabled: ${SPRING_H2_CONSOLE_ENABLED:false}

management:
  endpoint:
    health:
      probes:
        enabled: true
  endpoints:
    web:
      exposure:
        include: health

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}
  cookie-domain: ${COOKIE_DOMAIN:}
  visitor:
    cookie-secure: ${VISITOR_COOKIE_SECURE:false}
    time-zone: ${VISITOR_TIME_ZONE:Asia/Seoul}
    excluded-ips: ${VISITOR_EXCLUDED_IPS:}
  admin:
    username: ${ADMIN_USERNAME}
    password: ${ADMIN_PASSWORD:}
    password-hash: ${ADMIN_PASSWORD_HASH:}
  ai:
    base-url: ${NVIDIA_API_BASE_URL:https://integrate.api.nvidia.com}
    api-key: ${NVIDIA_API_KEY:}
    model: ${NVIDIA_MODEL:qwen/qwen3.5-122b-a10b}
    max-output-tokens: ${NVIDIA_MAX_OUTPUT_TOKENS:8192}
    # Qwen3.5 NIM 엔드포인트는 response_format 지정 시 빈 응답을 반환함 (지원 모델에서만 true)
    json-response-format: ${NVIDIA_JSON_RESPONSE_FORMAT:false}
    competency:
      enabled: ${COMPETENCY_AI_ENABLED:false}
    study:
      enabled: ${STUDY_AI_ENABLED:false}
    experience:
      enabled: ${EXPERIENCE_AI_ENABLED:false}
  donation:
    min-amount: ${DONATION_MIN_AMOUNT:1000}
    max-amount: ${DONATION_MAX_AMOUNT:100000}
    payapp:
      api-url: ${PAYAPP_API_URL:https://api.payapp.kr/oapi/apiLoad.html}
      user-id: ${PAYAPP_USER_ID:}
      link-key: ${PAYAPP_LINK_KEY:}
      link-value: ${PAYAPP_LINK_VALUE:}
      recv-phone: ${PAYAPP_RECV_PHONE:}
      # 페이앱 서버가 결제 상태를 통지하는 콜백 주소. 페이앱이 접근 가능한 공개 URL이어야 한다.
      feedback-url: ${PAYAPP_FEEDBACK_URL:http://localhost:8080/api/donations/payapp/callback}
      return-url: ${PAYAPP_RETURN_URL:http://localhost:8080/api/donations/complete}
  storage:
    endpoint: ${STORAGE_ENDPOINT:http://localhost:9000}
    # 브라우저가 presigned URL로 직접 PUT할 때 접속할 호스트. 로컬(docker-compose)처럼
    # 백엔드 컨테이너와 브라우저가 서로 다른 호스트명으로 접근해야 할 때만 endpoint와
    # 다르게 지정하고, 그 외(운영)에는 endpoint와 동일하므로 값을 지정하지 않아도 된다.
    presigned-endpoint: ${STORAGE_PRESIGNED_ENDPOINT:${STORAGE_ENDPOINT:http://localhost:9000}}
    region: ${STORAGE_REGION:us-east-1}
    bucket: ${STORAGE_BUCKET:self-intro-images}
    access-key: ${STORAGE_ACCESS_KEY:minioadmin}
    secret-key: ${STORAGE_SECRET_KEY:minioadmin}
    path-style-access: ${STORAGE_PATH_STYLE_ACCESS:true}
    presigned-upload-ttl-seconds: ${STORAGE_PRESIGNED_TTL_SECONDS:300}
    public-base-url: ${STORAGE_PUBLIC_BASE_URL:http://localhost:9000/self-intro-images}

server:
  port: ${SERVER_PORT:8080}
  servlet:
    session:
      timeout: 12h
      cookie:
        same-site: ${SESSION_COOKIE_SAME_SITE:lax}
