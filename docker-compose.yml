services:
  backend-db:
    image: mysql:8.0
    container_name: self-intro-db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: self_intro
      MYSQL_USER: self_intro_app
      MYSQL_PASSWORD: password123
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 5s
      retries: 5
      interval: 5s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: self-intro-backend
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      - SPRING_PROFILES_ACTIVE=local
      - DB_URL=jdbc:mysql://backend-db:3306/self_intro?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
      - DB_USERNAME=self_intro_app
      - DB_PASSWORD=password123
      - DB_DRIVER=com.mysql.cj.jdbc.Driver
      - JPA_DDL_AUTO=update
      - CORS_ALLOWED_ORIGINS=http://localhost:3000
      - STORAGE_ENDPOINT=http://minio:9000
      - STORAGE_PRESIGNED_ENDPOINT=http://localhost:9000
      - STORAGE_REGION=us-east-1
      - STORAGE_BUCKET=self-intro-images
      - STORAGE_ACCESS_KEY=minioadmin
      - STORAGE_SECRET_KEY=minioadmin
      - STORAGE_PATH_STYLE_ACCESS=true
      - STORAGE_PUBLIC_BASE_URL=http://localhost:9000/self-intro-images
    depends_on:
      backend-db:
        condition: service_healthy
      minio:
        condition: service_healthy

  minio:
    image: minio/minio
    container_name: self-intro-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      timeout: 5s
      retries: 5
      interval: 5s

  minio-init:
    image: minio/mc
    container_name: self-intro-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb -p local/self-intro-images &&
      mc anonymous set download local/self-intro-images
      "

  frontend-next:
    build:
      context: ./frontend-next
      dockerfile: Dockerfile
      target: deps
    container_name: self-intro-frontend-next
    command: sh -c "npm install --prefer-offline && npm run dev"
    volumes:
      - ./frontend-next:/app
      - /app/node_modules
      - /app/.next
    ports:
      - "3000:3000"
    environment:
      # 브라우저(호스트)는 이 주소로 API를 호출한다.
      - NEXT_PUBLIC_API_BASE_URL=http://localhost:8080
      # SSR(컨테이너 내부)은 도커 네트워크 안에서 backend 서비스명으로 접근한다.
      - API_INTERNAL_BASE_URL=http://backend:8080
    depends_on:
      - backend

volumes:
  mysql_data:
  minio_data:
